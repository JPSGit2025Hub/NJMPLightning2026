<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#08090c">
    <title>RTR Track Days - NJMP Thunderbolt</title>
    <link rel="stylesheet" href="styles.css">
    <script src="schedule.js?v=20260617-4" defer></script>
    <script src="app.js?v=20260617-4" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>RTR Track Days</h1>
        <p class="venue">NJMP Thnderbolt</p>
      </header>

      <nav class="tabs" aria-label="Primary">
        <button class="tab is-active" type="button" data-tab="live">LIVE</button>
        <button class="tab" type="button" data-tab="schedule">SCHEDULE</button>
        <button class="tab" type="button" data-tab="groups">RUN GROUPS</button>
      </nav>

      <main>
        <section class="panel is-active" id="live-panel" data-panel="live">
          <div class="selector selector-live" aria-label="Live day selector">
            <button type="button" class="selector-button is-active" data-live-day="auto">AUTO</button>
            <button type="button" class="selector-button" data-live-day="friday">FRIDAY</button>
            <button type="button" class="selector-button" data-live-day="saturday">SATURDAY</button>
            <button type="button" class="selector-button" data-live-day="sunday">SUNDAY</button>
          </div>

          <div class="day-line" id="live-day-label">AUTO</div>

          <article class="now-card" id="now-card">
            <p class="card-kicker">NOW ON TRACK</p>
            <h2 id="now-title">Loading</h2>
            <p class="time-range" id="now-time">--</p>
          </article>

          <article class="deck-card" id="deck-card">
            <p class="card-kicker">ON DECK</p>
            <h3 id="deck-title">Loading</h3>
            <p class="time-range" id="deck-time">--</p>
          </article>

          <p class="status-note" id="live-updated">Updates every 30 seconds</p>
        </section>

        <section class="panel" id="schedule-panel" data-panel="schedule">
          <div class="selector" aria-label="Schedule day selector">
            <button type="button" class="selector-button is-active" data-schedule-day="friday">FRIDAY</button>
            <button type="button" class="selector-button" data-schedule-day="saturday">SATURDAY</button>
            <button type="button" class="selector-button" data-schedule-day="sunday">SUNDAY</button>
          </div>

          <div class="schedule-list" id="schedule-list" aria-live="polite"></div>
        </section>

        <section class="panel" id="groups-panel" data-panel="groups">
          <div id="groups-overview">
            <div class="group-grid" id="group-grid"></div>
          </div>

          <div class="group-detail is-hidden" id="group-detail">
            <button class="back-button" type="button" id="groups-back">Back to all groups</button>
            <div id="group-detail-content"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
